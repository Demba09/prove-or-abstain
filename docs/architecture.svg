<svg viewBox="0 0 960 340" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="340" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">prove-or-abstain</text>

  <!-- loop-back label + arc -->
  <text x="400" y="58" text-anchor="middle" font-size="11" fill="#b45309">no localization — try the next dimension (bounded)</text>
  <path d="M 560 96 C 560 66, 240 66, 240 96" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLoop)"/>

  <!-- pipeline -->
  <g font-size="13">
    <rect x="14"  y="100" width="132" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80"  y="127" text-anchor="middle" font-weight="700" fill="#3730a3">detector</text>
    <text x="80"  y="145" text-anchor="middle" font-size="10" fill="#6366f1">flags the anomaly</text>

    <rect x="174" y="100" width="132" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="240" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">hypothesizer</text>
    <text x="240" y="145" text-anchor="middle" font-size="10" fill="#6366f1">picks a dimension</text>

    <rect x="334" y="100" width="132" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="400" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">investigator</text>
    <text x="400" y="145" text-anchor="middle" font-size="10" fill="#6366f1">decomposes ΔR</text>

    <rect x="494" y="100" width="132" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="560" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">verifier</text>
    <text x="560" y="145" text-anchor="middle" font-size="10" fill="#6366f1">runs the gates</text>

    <rect x="654" y="100" width="132" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="720" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">actuator</text>
    <text x="720" y="145" text-anchor="middle" font-size="10" fill="#6366f1">decides</text>

    <rect x="814" y="100" width="132" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="880" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">reporter</text>
    <text x="880" y="145" text-anchor="middle" font-size="10" fill="#6366f1">writes the audit</text>

    <line x1="148" y1="131" x2="172" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="308" y1="131" x2="332" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="468" y1="131" x2="492" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="628" y1="131" x2="652" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="788" y1="131" x2="812" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- gates, under the verifier -->
  <line x1="560" y1="162" x2="560" y2="198" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="462" y="200" width="196" height="104" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="560" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">gates — all must pass</text>
  <text x="478" y="240" font-size="10.5" fill="#78350f">material effect ≥ 2%</text>
  <text x="478" y="257" font-size="10.5" fill="#78350f">concentration ≥ 0.55</text>
  <text x="478" y="274" font-size="10.5" fill="#78350f">leading segment n ≥ 1000</text>
  <text x="478" y="291" font-size="10.5" fill="#78350f">interaction share ≤ 0.50</text>

  <!-- verdicts, under the actuator -->
  <line x1="720" y1="162" x2="720" y2="198" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="676" y="200" width="230" height="34" rx="7" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.3"/>
  <text x="791" y="221" text-anchor="middle" font-size="11" fill="#166534"><tspan font-weight="700">ASSERT</tspan> → recommend or execute*</text>
  <rect x="676" y="244" width="230" height="34" rx="7" fill="#fef2f2" stroke="#ef4444" stroke-width="1.3"/>
  <text x="791" y="265" text-anchor="middle" font-size="11" fill="#991b1b"><tspan font-weight="700">ABSTAIN</tspan> → escalate to a human</text>
  <text x="791" y="296" text-anchor="middle" font-size="9.5" fill="#6b7280">* only with autopilot on and confidence ≥ 0.70</text>

  <!-- LLM boundary, plain text on the free left side -->
  <text x="20" y="226" font-size="11" fill="#047857" font-weight="700">Division of labour</text>
  <text x="20" y="245" font-size="10.5" fill="#065f46">every number comes from pandas / numpy</text>
  <text x="20" y="262" font-size="10.5" fill="#065f46">the LLM orders the dimensions to try and</text>
  <text x="20" y="279" font-size="10.5" fill="#065f46">writes the report — it never computes a figure</text>
</svg>
