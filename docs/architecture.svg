<svg viewBox="0 0 960 340" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="340" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">prove-or-abstain</text>

  <!-- loop-back label + arc -->
  <text x="360" y="58" text-anchor="middle" font-size="11" fill="#b45309">no localization — try the next dimension (bounded)</text>
  <path d="M 480 96 C 480 66, 212 66, 212 96" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLoop)"/>

  <!-- pipeline -->
  <g font-size="12">
    <rect x="20"  y="100" width="116" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="78"  y="127" text-anchor="middle" font-weight="700" fill="#3730a3">detector</text>
    <text x="78"  y="145" text-anchor="middle" font-size="9.5" fill="#6366f1">flags the anomaly</text>

    <rect x="154" y="100" width="116" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="212" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">hypothesizer</text>
    <text x="212" y="145" text-anchor="middle" font-size="9.5" fill="#6366f1">picks a dimension</text>

    <rect x="288" y="100" width="116" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="346" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">investigator</text>
    <text x="346" y="145" text-anchor="middle" font-size="9.5" fill="#6366f1">decomposes ΔR</text>

    <rect x="422" y="100" width="116" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="480" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">verifier</text>
    <text x="480" y="145" text-anchor="middle" font-size="9.5" fill="#6366f1">runs the gates</text>

    <rect x="556" y="100" width="116" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="614" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">driller</text>
    <text x="614" y="145" text-anchor="middle" font-size="9.5" fill="#6366f1">refines the cause</text>

    <rect x="690" y="100" width="116" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="748" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">actuator</text>
    <text x="748" y="145" text-anchor="middle" font-size="9.5" fill="#6366f1">decides</text>

    <rect x="824" y="100" width="116" height="62" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="882" y="127" text-anchor="middle" font-weight="700" fill="#3730a3">reporter</text>
    <text x="882" y="145" text-anchor="middle" font-size="9.5" fill="#6366f1">writes the audit</text>

    <line x1="138" y1="131" x2="152" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="272" y1="131" x2="286" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="406" y1="131" x2="420" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="540" y1="131" x2="554" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="674" y1="131" x2="688" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="808" y1="131" x2="822" y2="131" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- gates, under the verifier -->
  <line x1="480" y1="162" x2="480" y2="198" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="368" y="200" width="224" height="104" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="480" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">gates — all must pass</text>
  <text x="384" y="240" font-size="10.5" fill="#78350f">material effect ≥ 2%</text>
  <text x="384" y="257" font-size="10.5" fill="#78350f">concentration ≥ 0.55</text>
  <text x="384" y="274" font-size="10.5" fill="#78350f">leader significant (z-test, p ≤ 0.01)</text>
  <text x="384" y="291" font-size="10.5" fill="#78350f">interaction share ≤ 0.50</text>

  <!-- verdicts, under the actuator -->
  <line x1="748" y1="162" x2="748" y2="198" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="676" y="200" width="230" height="34" rx="7" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.3"/>
  <text x="791" y="221" text-anchor="middle" font-size="11" fill="#166534"><tspan font-weight="700">ASSERT</tspan> → recommend or execute*</text>
  <rect x="676" y="244" width="230" height="34" rx="7" fill="#fef2f2" stroke="#ef4444" stroke-width="1.3"/>
  <text x="791" y="265" text-anchor="middle" font-size="11" fill="#991b1b"><tspan font-weight="700">ABSTAIN</tspan> → escalate to a human</text>
  <text x="791" y="296" text-anchor="middle" font-size="9.5" fill="#6b7280">* only with autopilot on and confidence ≥ 0.70</text>

  <!-- LLM boundary, plain text on the free left side -->
  <text x="20" y="226" font-size="11" fill="#047857" font-weight="700">Division of labour</text>
  <text x="20" y="245" font-size="10.5" fill="#065f46">every number comes from pandas / numpy</text>
  <text x="20" y="262" font-size="10.5" fill="#065f46">the LLM orders the dimensions to try and</text>
  <text x="20" y="279" font-size="10.5" fill="#065f46">writes the report — it never computes a figure</text>
</svg>
