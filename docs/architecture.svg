<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="660" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">prove-or-abstain — architecture</text>
  <text x="480" y="50" text-anchor="middle" font-size="12.5" fill="#6b7280">LangGraph investigation loop, gated by deterministic math — the LLM never computes or decides</text>

  <!-- ===================== investigation graph row ===================== -->
  <g font-size="13">
    <!-- Detector -->
    <rect x="10" y="90" width="140" height="58" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="114" text-anchor="middle" font-weight="700" fill="#3730a3">detector</text>
    <text x="80" y="131" text-anchor="middle" font-size="10.5" fill="#4338ca">flags material Δ</text>

    <!-- Hypothesizer -->
    <rect x="172" y="90" width="140" height="58" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="242" y="114" text-anchor="middle" font-weight="700" fill="#3730a3">hypothesizer</text>
    <text x="242" y="131" text-anchor="middle" font-size="10.5" fill="#4338ca">next dim to try</text>

    <!-- Investigator -->
    <rect x="334" y="90" width="140" height="58" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="404" y="114" text-anchor="middle" font-weight="700" fill="#3730a3">investigator</text>
    <text x="404" y="131" text-anchor="middle" font-size="10.5" fill="#4338ca">rate/mix decompose</text>

    <!-- Verifier -->
    <rect x="496" y="90" width="140" height="58" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="566" y="114" text-anchor="middle" font-weight="700" fill="#3730a3">verifier</text>
    <text x="566" y="131" text-anchor="middle" font-size="10.5" fill="#4338ca">4 gates -&gt; verdict</text>

    <!-- Actuator -->
    <rect x="658" y="90" width="140" height="58" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="728" y="114" text-anchor="middle" font-weight="700" fill="#3730a3">actuator</text>
    <text x="728" y="131" text-anchor="middle" font-size="10.5" fill="#4338ca">recommend / execute</text>

    <!-- Reporter -->
    <rect x="810" y="90" width="140" height="58" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="880" y="114" text-anchor="middle" font-weight="700" fill="#3730a3">reporter</text>
    <text x="880" y="131" text-anchor="middle" font-size="10.5" fill="#4338ca">audit trail + text</text>

    <!-- forward arrows -->
    <line x1="150" y1="119" x2="170" y2="119" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="312" y1="119" x2="332" y2="119" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="474" y1="119" x2="494" y2="119" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="636" y1="119" x2="656" y2="119" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="798" y1="119" x2="808" y2="119" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- verdict label on verifier -> actuator edge -->
  <text x="647" y="107" text-anchor="middle" font-size="10" fill="#065f46" font-weight="700">ASSERT / exhausted</text>

  <!-- loop-back arrow: verifier -> hypothesizer (bounded by max_iterations) -->
  <path d="M 566 88 C 566 40, 242 40, 242 88" fill="none" stroke="#b45309" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrowLoop)"/>
  <text x="404" y="34" text-anchor="middle" font-size="11" fill="#b45309" font-weight="700">loop: dimension inconclusive, dims remain, iteration &lt; max_iterations</text>

  <!-- no-anomaly shortcut: detector -> reporter -->
  <path d="M 60 150 C 60 210, 860 210, 878 150" fill="none" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="480" y="204" text-anchor="middle" font-size="10.5" fill="#6b7280">no material anomaly -&gt; straight to reporter (NO_ANOMALY)</text>

  <!-- ===================== gates detail box ===================== -->
  <rect x="410" y="228" width="320" height="118" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.3"/>
  <text x="570" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">verifier gates — ALL must pass to ASSERT</text>
  <text x="424" y="267" font-size="11" fill="#78350f">• material     |ΔR|/R0 ≥ 2%</text>
  <text x="424" y="284" font-size="11" fill="#78350f">• localized    concentration ≥ 0.55</text>
  <text x="424" y="301" font-size="11" fill="#78350f">• sample       leading segment n ≥ 1000</text>
  <text x="424" y="318" font-size="11" fill="#78350f">• clean        interaction share ≤ 0.50</text>
  <text x="570" y="336" text-anchor="middle" font-size="10.5" fill="#92400e" font-style="italic">one gate fails -&gt; ABSTAIN, named reason, no guessing</text>
  <line x1="566" y1="148" x2="566" y2="226" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ===================== LLM boundary callouts ===================== -->
  <rect x="10" y="228" width="390" height="66" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.3"/>
  <text x="205" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">the boundary that makes this credible</text>
  <text x="205" y="263" text-anchor="middle" font-size="10.5" fill="#047857">numbers: pandas/numpy only, never the LLM</text>
  <text x="205" y="279" text-anchor="middle" font-size="10.5" fill="#047857">LLM: orders dims + writes prose — never computes or decides</text>
  <line x1="242" y1="148" x2="242" y2="226" stroke="#10b981" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="880" y1="148" x2="880" y2="180" stroke="#10b981" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="242" y1="180" x2="880" y2="180" stroke="#10b981" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- ===================== verdict outcomes ===================== -->
  <rect x="750" y="228" width="200" height="118" rx="8" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="850" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">terminal verdicts</text>
  <rect x="764" y="258" width="80" height="24" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="804" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">ASSERT</text>
  <text x="850" y="274" font-size="9" fill="#374151">RECOMMEND, or</text>
  <text x="850" y="285" font-size="9" fill="#374151">EXECUTE if autopilot</text>
  <text x="850" y="296" font-size="9" fill="#374151">+ conf ≥ 0.70</text>
  <rect x="764" y="308" width="80" height="24" rx="5" fill="#fee2e2" stroke="#dc2626"/>
  <text x="804" y="324" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">ABSTAIN</text>
  <text x="850" y="324" font-size="9" fill="#374151">ESCALATE,</text>
  <text x="850" y="335" font-size="9" fill="#374151">requires_human=True</text>

  <!-- ===================== deployment row ===================== -->
  <text x="480" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">deployment</text>

  <g font-size="12">
    <rect x="20" y="410" width="170" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
    <text x="105" y="433" text-anchor="middle" font-weight="700" fill="#1d4ed8">FastAPI</text>
    <text x="105" y="450" text-anchor="middle" font-size="10.5" fill="#1e40af">POST /investigate, GET /health</text>

    <rect x="230" y="410" width="170" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
    <text x="315" y="433" text-anchor="middle" font-weight="700" fill="#1d4ed8">Docker image</text>
    <text x="315" y="450" text-anchor="middle" font-size="9.5" fill="#1e40af">python:3.12-slim, no .env baked in</text>

    <rect x="440" y="410" width="170" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
    <text x="525" y="433" text-anchor="middle" font-weight="700" fill="#1d4ed8">Alibaba Cloud ACR</text>
    <text x="525" y="450" text-anchor="middle" font-size="10.5" fill="#1e40af">Container Registry (amd64)</text>

    <rect x="650" y="410" width="170" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
    <text x="735" y="433" text-anchor="middle" font-weight="700" fill="#1d4ed8">Function Compute</text>
    <text x="735" y="450" text-anchor="middle" font-size="10.5" fill="#1e40af">custom container runtime</text>

    <rect x="860" y="410" width="90" height="56" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.4"/>
    <text x="905" y="433" text-anchor="middle" font-weight="700" fill="#15803d">HTTPS</text>
    <text x="905" y="450" text-anchor="middle" font-size="10.5" fill="#166534">demo URL</text>

    <line x1="190" y1="438" x2="228" y2="438" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="400" y1="438" x2="438" y2="438" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="610" y1="438" x2="648" y2="438" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="820" y1="438" x2="858" y2="438" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>
  <text x="480" y="490" text-anchor="middle" font-size="10.5" fill="#6b7280">secrets (DASHSCOPE_API_KEY) injected at runtime only — never copied into the image</text>

  <!-- ===================== demo panels ===================== -->
  <text x="480" y="530" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">demo panels (in-memory, deterministic)</text>
  <g font-size="11.5">
    <rect x="120" y="546" width="220" height="66" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.3"/>
    <text x="230" y="566" text-anchor="middle" font-weight="700" fill="#15803d">clean</text>
    <text x="230" y="583" text-anchor="middle" font-size="10" fill="#166534">'paid' segment alone drops</text>
    <text x="230" y="598" text-anchor="middle" font-size="10" fill="#166534">-&gt; ASSERT, segment=paid</text>

    <rect x="370" y="546" width="220" height="66" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.3"/>
    <text x="480" y="566" text-anchor="middle" font-weight="700" fill="#991b1b">diffuse</text>
    <text x="480" y="583" text-anchor="middle" font-size="10" fill="#7f1d1d">every segment drops uniformly</text>
    <text x="480" y="598" text-anchor="middle" font-size="10" fill="#7f1d1d">-&gt; ABSTAIN, no localized cause</text>

    <rect x="620" y="546" width="220" height="66" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.3"/>
    <text x="730" y="566" text-anchor="middle" font-weight="700" fill="#991b1b">mixshift</text>
    <text x="730" y="583" text-anchor="middle" font-size="10" fill="#7f1d1d">mix + rate + interaction all move</text>
    <text x="730" y="598" text-anchor="middle" font-size="10" fill="#7f1d1d">-&gt; ABSTAIN, entangled mechanism</text>
  </g>

  <text x="480" y="645" text-anchor="middle" font-size="10.5" fill="#9ca3af">detector -&gt; hypothesizer -&gt; investigator -&gt; verifier (bounded loop) -&gt; actuator -&gt; reporter — six nodes, one framework coupling point (graph.py)</text>
</svg>
