<svg viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="420" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">prove-or-abstain — architecture</text>

  <!-- Qwen Cloud + MCP at top -->
  <rect x="320" y="50" width="320" height="36" rx="7" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.3"/>
  <text x="480" y="73" text-anchor="middle" font-size="12" font-weight="700" fill="#1a56db">Qwen Cloud (MCP agent — orchestrates, interprets)</text>
  <line x1="480" y1="86" x2="480" y2="98" stroke="#4285f4" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- loop-back label + arc -->
  <text x="360" y="108" text-anchor="middle" font-size="11" fill="#b45309">no localization — try the next dimension (bounded)</text>
  <path d="M 480 146 C 480 116, 212 116, 212 146" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLoop)"/>

  <!-- pipeline -->
  <g font-size="12">
    <rect x="20"  y="150" width="116" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="78"  y="175" text-anchor="middle" font-weight="700" fill="#3730a3">detector</text>
    <text x="78"  y="193" text-anchor="middle" font-size="9.5" fill="#6366f1">flags the anomaly</text>

    <rect x="154" y="150" width="116" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="212" y="175" text-anchor="middle" font-weight="700" fill="#3730a3">hypothesizer</text>
    <text x="212" y="193" text-anchor="middle" font-size="9.5" fill="#6366f1">picks a dimension</text>

    <rect x="288" y="150" width="116" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="346" y="175" text-anchor="middle" font-weight="700" fill="#3730a3">investigator</text>
    <text x="346" y="193" text-anchor="middle" font-size="9.5" fill="#6366f1">decomposes ΔR</text>

    <rect x="422" y="150" width="116" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="480" y="175" text-anchor="middle" font-weight="700" fill="#3730a3">verifier</text>
    <text x="480" y="193" text-anchor="middle" font-size="9.5" fill="#6366f1">runs the gates</text>

    <rect x="556" y="150" width="116" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="614" y="175" text-anchor="middle" font-weight="700" fill="#3730a3">driller</text>
    <text x="614" y="193" text-anchor="middle" font-size="9.5" fill="#6366f1">refines the cause</text>

    <rect x="690" y="150" width="116" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="748" y="175" text-anchor="middle" font-weight="700" fill="#3730a3">actuator</text>
    <text x="748" y="193" text-anchor="middle" font-size="9.5" fill="#6366f1">decides</text>

    <rect x="824" y="150" width="116" height="56" rx="9" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="882" y="175" text-anchor="middle" font-weight="700" fill="#3730a3">reporter</text>
    <text x="882" y="193" text-anchor="middle" font-size="9.5" fill="#6366f1">writes the audit</text>

    <line x1="138" y1="178" x2="152" y2="178" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="272" y1="178" x2="286" y2="178" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="406" y1="178" x2="420" y2="178" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="540" y1="178" x2="554" y2="178" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="674" y1="178" x2="688" y2="178" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="808" y1="178" x2="822" y2="178" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- gates -->
  <line x1="480" y1="206" x2="480" y2="238" stroke="#f59e0b" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="340" y="240" width="280" height="96" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="480" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">gates — all must pass</text>
  <text x="355" y="276" font-size="10.5" fill="#78350f">material ≥ 2% | concentration ≥ 0.55</text>
  <text x="355" y="293" font-size="10.5" fill="#78350f">z-test p ≤ 0.01 | interaction ≤ 0.50</text>
  <text x="355" y="318" font-size="10" fill="#92400e">deterministic — verdict never depends on LLM</text>

  <!-- verdicts -->
  <line x1="748" y1="206" x2="748" y2="238" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="650" y="240" width="290" height="30" rx="7" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.3"/>
  <text x="795" y="259" text-anchor="middle" font-size="11" fill="#166534"><tspan font-weight="700">ASSERT</tspan> → recommend or execute</text>
  <rect x="650" y="278" width="290" height="30" rx="7" fill="#fef2f2" stroke="#ef4444" stroke-width="1.3"/>
  <text x="795" y="297" text-anchor="middle" font-size="11" fill="#991b1b"><tspan font-weight="700">ABSTAIN</tspan> → escalate to human</text>

  <!-- webhook + dashboard at bottom -->
  <rect x="620" y="320" width="150" height="38" rx="7" fill="#fce7f3" stroke="#ec4899" stroke-width="1.3"/>
  <text x="695" y="344" text-anchor="middle" font-size="11" font-weight="700" fill="#9d174d">Webhook (Slack, etc.)</text>
  <line x1="795" y1="308" x2="695" y2="320" stroke="#ec4899" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <rect x="790" y="320" width="150" height="38" rx="7" fill="#eef2ff" stroke="#6366f1" stroke-width="1.3"/>
  <text x="865" y="344" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">Dashboard / Audit</text>

  <!-- data sources + LLM boundary on the left -->
  <text x="20" y="264" font-size="11" fill="#047857" font-weight="700">Data sources</text>
  <text x="20" y="282" font-size="10" fill="#065f46">CSV upload · SQL (PG/MySQL/SQLite)</text>
  <text x="20" y="297" font-size="10" fill="#065f46">Google Sheets · time series</text>
  <text x="20" y="312" font-size="10" fill="#065f46">Watch a source (continuous ingestion)</text>

  <text x="20" y="338" font-size="11" fill="#047857" font-weight="700">AI boundary</text>
  <text x="20" y="356" font-size="10" fill="#065f46">Qwen orders dims, writes reports</text>
  <text x="20" y="371" font-size="10" fill="#065f46">Qwen MCP agent orchestrates</text>
  <text x="20" y="392" font-size="10" fill="#065f46">never computes a number</text>
</svg>
